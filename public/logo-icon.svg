<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <clipPath id="outerClip">
      <circle cx="100" cy="100" r="95"/>
    </clipPath>
  </defs>

  <g clip-path="url(#outerClip)">
    <!-- White base -->
    <circle cx="100" cy="100" r="95" fill="white"/>

    <!-- Green wing / leaf shapes (brain visualization) -->
    <ellipse cx="80" cy="86" rx="25" ry="56" fill="#72c441" transform="rotate(-13 80 86)"/>
    <ellipse cx="120" cy="86" rx="25" ry="56" fill="#72c441" transform="rotate(13 120 86)"/>

    <!-- Head profile — left-facing, white fill + dark outline -->
    <path
      fill="white"
      stroke="#1a4755"
      stroke-width="4.5"
      stroke-linejoin="round"
      stroke-linecap="round"
      d="
        M 100 26
        C 120 22 140 34 152 54
        C 164 74 164 98 158 118
        C 152 138 140 154 124 163
        L 120 170
        L 80 170
        L 76 162
        C 66 150 60 134 58 118
        C 56 104 56 92 52 84
        C 50 78 44 76 38 72
        C 33 68 33 62 37 58
        C 41 54 48 58 51 64
        C 53 68 55 70 57 68
        C 61 58 68 44 78 32
        C 86 24 94 24 100 26 Z
      "
    />

    <!-- Neck parallel lines -->
    <line x1="86" y1="163" x2="86" y2="170" stroke="#1a4755" stroke-width="2.5"/>
    <line x1="94" y1="164" x2="94" y2="170" stroke="#1a4755" stroke-width="2.5"/>
    <line x1="102" y1="164" x2="102" y2="170" stroke="#1a4755" stroke-width="2.5"/>
    <line x1="110" y1="163" x2="110" y2="170" stroke="#1a4755" stroke-width="2.5"/>

    <!-- Green brain circle (sits inside the head) -->
    <circle cx="100" cy="80" r="32" fill="#72c441"/>
    <circle cx="100" cy="80" r="26" fill="#58b030"/>

    <!-- Golf ball -->
    <circle cx="100" cy="63" r="22" fill="white"/>
    <!-- Seam lines (ellipses give the dimple/seam look) -->
    <ellipse cx="100" cy="63" rx="22" ry="8"  fill="none" stroke="#c0c0c0" stroke-width="0.9"/>
    <ellipse cx="100" cy="63" rx="8"  ry="22" fill="none" stroke="#c0c0c0" stroke-width="0.9"/>
    <ellipse cx="100" cy="63" rx="22" ry="14" fill="none" stroke="#cccccc" stroke-width="0.7" transform="rotate(45 100 63)"/>
    <ellipse cx="100" cy="63" rx="22" ry="14" fill="none" stroke="#cccccc" stroke-width="0.7" transform="rotate(-45 100 63)"/>

    <!-- Tee cup -->
    <path d="M 91 85 Q 100 80 109 85" fill="none" stroke="#1a4755" stroke-width="4.5" stroke-linecap="round"/>
    <!-- Tee stick -->
    <rect x="98" y="85" width="4" height="22" rx="2" fill="#1a4755"/>
  </g>

  <!-- Outer ring (drawn last so it sits on top) -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#1a4755" stroke-width="6"/>
</svg>
